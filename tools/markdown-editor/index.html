<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公众号排版器</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <div class="header-left">
                    <a href="../../index.html" class="home-btn">🏠 主页</a>
                </div>
                <div class="header-center">
                    <h1>📝 公众号排版器</h1>
                </div>
                <div class="header-right">
                </div>
            </div>
            <div class="toolbar">
                <div class="toolbar-group">
                    <span class="toolbar-label">样式模板：</span>
                    <button class="template-btn" data-template="tech">💻 科技风</button>
                    <button class="template-btn" data-template="minimal">📄 简约风</button>
                    <button class="template-btn" data-template="warm">🌞 温暖风</button>
                    <button class="template-btn" data-template="dark">🌙 暗黑风</button>
                    <button class="template-btn" data-template="fresh">🍀 清新风</button>
                    <button class="template-btn" data-template="magazine">📖 杂志风</button>
                    <button class="template-btn" data-template="academic">📚 学术风</button>
                    <button class="template-btn" data-template="notebook">📒 手账风</button>
                </div>
                <div class="toolbar-group">
                    <span class="toolbar-label">快速插入：</span>
                    <button class="toolbar-btn" data-insert="h2">## 二级标题</button>
                    <button class="toolbar-btn" data-insert="h3">### 三级标题</button>
                    <button class="toolbar-btn" data-insert="quote">> 引用</button>
                    <button class="toolbar-btn" data-insert="code">``` 代码块</button>
                    <button class="toolbar-btn" data-insert="list">- 列表</button>
                </div>
                <div class="toolbar-group">
                    <button id="loadTemplateBtn" class="toolbar-btn">📄 加载示例</button>
                    <button id="clearBtn" class="toolbar-btn">🗑️ 清空</button>
                    <button id="copyWechatBtn" class="copy-btn">📋 复制到公众号</button>
                </div>
            </div>
        </header>

        <div class="editor-container">
            <div class="editor-pane">
                <div class="pane-header">
                    <h3>✏️ Markdown 编辑</h3>
                </div>
                <textarea id="editor" placeholder="在这里输入 Markdown 内容..."></textarea>
            </div>
            <div class="preview-pane">
                <div class="pane-header">
                    <h3>👁️ 公众号预览</h3>
                </div>
                <div id="preview" class="wechat-preview"></div>
            </div>
        </div>

        <div id="copyStatus" class="copy-status hidden">✓ 已复制到剪贴板！</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
