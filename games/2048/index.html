<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 AI对战版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <a href="../../index.html" class="home-btn">🏠 主页</a>
                <h1>🎯 2048 AI对战版</h1>
            </div>
            <div class="game-modes">
                <button class="mode-btn active" data-mode="solo">🎮 单人模式</button>
                <button class="mode-btn" data-mode="ai-vs">⚔️ AI对战</button>
                <button class="mode-btn" data-mode="ai-demo">🤖 AI演示</button>
            </div>
        </header>

        <div class="game-container">
            <div id="playerBoard" class="board-container">
                <div class="board-header">
                    <h2>玩家</h2>
                    <div class="stats">
                        <span class="stat">分数: <span id="playerScore">0</span></span>
                        <span class="stat">步数: <span id="playerMoves">0</span></span>
                        <span class="stat">最大: <span id="playerMax">0</span></span>
                    </div>
                </div>
                <div class="grid-container">
                    <div id="playerGrid" class="grid"></div>
                </div>
            </div>

            <div id="aiBoard" class="board-container hidden">
                <div class="board-header">
                    <h2>AI</h2>
                    <div class="stats">
                        <span class="stat">分数: <span id="aiScore">0</span></span>
                        <span class="stat">步数: <span id="aiMoves">0</span></span>
                        <span class="stat">最大: <span id="aiMax">0</span></span>
                    </div>
                </div>
                <div class="grid-container">
                    <div id="aiGrid" class="grid"></div>
                </div>
            </div>
        </div>

        <div class="game-info">
            <div id="gameMessage" class="message"></div>
            <div class="controls">
                <button id="newGameBtn" class="primary-btn">🔄 新游戏</button>
                <div id="demoControls" class="demo-controls hidden">
                    <label for="demoSpeed">演示速度:</label>
                    <input type="range" id="demoSpeed" min="100" max="1000" value="500">
                    <button id="pauseDemoBtn" class="secondary-btn">⏸️ 暂停</button>
                </div>
            </div>
            <div class="instructions">
                <p>🎮 方向键 / WASD 移动方块</p>
                <p>🏆 相同数字合并，目标2048！</p>
            </div>
            <div id="touchControls" class="touch-controls">
                <div class="touch-row">
                    <button class="touch-btn" data-dir="up">↑</button>
                </div>
                <div class="touch-row">
                    <button class="touch-btn" data-dir="left">←</button>
                    <button class="touch-btn" data-dir="down">↓</button>
                    <button class="touch-btn" data-dir="right">→</button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束！</h2>
            <p id="modalMessage"></p>
            <div class="modal-buttons">
                <button id="modalNewGame" class="primary-btn">再来一局</button>
                <a href="../../index.html" class="secondary-btn" style="text-decoration: none;">返回主页</a>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
